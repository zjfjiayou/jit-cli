name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package.outputs.name }}
      package_version: ${{ steps.package.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Package Metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify Tag Matches package.json
        env:
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [ "v${PACKAGE_VERSION}" != "${TAG_NAME}" ]; then
            echo "Git tag (${TAG_NAME}) 与 package.json version (${PACKAGE_VERSION}) 不一致" >&2
            exit 1
          fi

      - name: Run Tests
        run: go test ./...

  github_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm_publish:
    name: Publish npm Wrapper
    runs-on: ubuntu-latest
    needs:
      - validate
      - github_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Skip When NPM_TOKEN Is Missing
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "未配置 NPM_TOKEN，跳过 npm publish"

      - name: Check Published Version
        if: ${{ secrets.NPM_TOKEN != '' }}
        id: npm_version
        env:
          PACKAGE_NAME: ${{ needs.validate.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.validate.outputs.package_version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm Package
        if: ${{ secrets.NPM_TOKEN != '' && steps.npm_version.outputs.published != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Skip When Version Already Exists
        if: ${{ secrets.NPM_TOKEN != '' && steps.npm_version.outputs.published == 'true' }}
        env:
          PACKAGE_NAME: ${{ needs.validate.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.validate.outputs.package_version }}
        run: echo "${PACKAGE_NAME}@${PACKAGE_VERSION} 已存在，跳过 npm publish"
